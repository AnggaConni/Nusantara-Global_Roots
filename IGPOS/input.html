<body class="batik-bg text-gray-900 min-h-screen">

  <script type="text/babel">

      "NE - Not Evaluated", "DD - Data Deficient", "LC - Least Concern",

    ];
    const processingMethodOptions = ["Natural / Dry", "Washed / Wet", "Honey", "Wet-Hulled (Giling Basah)", "Anaerobic", "Tradisional", "Lainnya"];
    const harvestMethodOptions = ["Regeneratif (lestari)", "Selective harvesting", "Rotasi terjadwal", "Eksploitatif", "Belum diketahui"];

    const STORAGE_KEY = 'igpos_v3_data';
    const SETTINGS_KEY = 'igpos_v3_settings';
    const DRAFT_KEY = 'igpos_v3_draft';

    // ============================================================
    // IMAGE COMPRESSION UTILITY
    // ============================================================
    const compressImage = (file, maxWidth = 1024, quality = 0.72) => {
      return new Promise((resolve, reject) => {
        if (!file.type.startsWith('image/')) {
          reject(new Error('File bukan gambar'));
          return;
        }
        const reader = new FileReader();
        reader.onerror = () => reject(new Error('Gagal membaca file'));
        reader.onload = (e) => {
          const img = new Image();
          img.onerror = () => reject(new Error('Gagal load gambar'));
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let { width, height } = img;
            if (width > maxWidth) {
              height = Math.round(height * (maxWidth / width));
              width = maxWidth;
            }
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, width, height);
            ctx.drawImage(img, 0, 0, width, height);
            const compressed = canvas.toDataURL('image/jpeg', quality);
            const originalKB = (file.size / 1024).toFixed(1);
            const compressedKB = ((compressed.length * 0.75) / 1024).toFixed(1);
            resolve({
              data: compressed,
              originalSize: parseFloat(originalKB),
              compressedSize: parseFloat(compressedKB),
              width, height,
              name: file.name
            });
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    };

    const formatBytes = (kb) => {
      if (kb < 1024) return kb.toFixed(1) + ' KB';
      return (kb / 1024).toFixed(2) + ' MB';
    };

    // ============================================================
    // INITIAL DATA (with sample images placeholder)
    // ============================================================
    const initialData = [
      {

        sku: "IGPOS-NKN-001",
        producer: "Mama Yosefa & Kelompok Wamena",
        designation: "ICH", 
        origin: "Wamena, Papua Pegunungan",
        productType: "Kriya / Kerajinan",
        priceLocal: 350000,

        taglineId: "Dirajut oleh Hutan, Dijaga oleh Mama",

        rawMaterial: "Kulit pohon Genemo (Gnetum gnemon)",

        partUsed: "Kulit kayu (inner bark)",
        harvestMethod: "Regeneratif (lestari)",
        rotationPeriod: "12 bulan",
        naturalDyes: "Kunyit, kulit kayu soga, daun mengkudu",
        traditionalTechnique: "Tying (ikat) + half-hitch knot",
        timeToMake: "21 hari",
        // Biodiversity
        iucnStatus: "LC - Least Concern",
        endemicSpecies: "Burung Cenderawasih (habitat sekitar)",
        bioregion: "Hutan Pegunungan Tengah Papua",
        // Producer profile
        producerCount: 24,
        womenPercent: 100,
        indigenousGroup: "Suku Dani",
        producerStory: "Kelompok mama-mama Papua dari Lembah Baliem yang melestarikan tradisi noken sambil menjaga hutan adat.",
        // Geo
        latitude: -4.0747,
        longitude: 138.9469,
        altitude: 1650,
        // Scores
        totalScore: 88,

        // Carbon
        totalEmissionKg: 280, outputTon: 0.05, estimatedAnnualOutputTon: 1.0,
        pohonDiselamatkan: 500, carbonSinkTon: 11.0, 
        carbonAuditStatus: "Verified carbon accounting",
        // All Yes/No flags
        hasNIB: 'Ya', hasNPWP: 'Ya', hasFSC: 'Ya', isIGProtected: 'Ya',
        hasUNESCOBranding: 'Ya', hasProductStory: 'Ya', hasInfografis: 'Ya',
        hasQRCode: 'Ya', isFairTrade: 'Ya',
        // Images (empty array — user akan upload)
        images: [],
        producerPhoto: null,
        sopCompleteness: 'Lengkap'
      }
    ];

    // ============================================================
    // TOAST SYSTEM
    // ============================================================
    const ToastContext = React.createContext();
    function ToastProvider({ children }) {
      const [toasts, setToasts] = useState([]);
      const show = (message, type = 'info', duration = 3500) => {
        const id = Date.now() + Math.random();
        setToasts(prev => [...prev, { id, message, type }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), duration);
      };
      return (
        <ToastContext.Provider value={{ show }}>
          {children}
          <div className="fixed top-20 right-4 z-50 space-y-2 max-w-sm">
            {toasts.map(t => (
              <div key={t.id} className={`toast-enter px-4 py-3 rounded-xl shadow-lg border flex items-start gap-3 backdrop-blur-sm ${
                t.type === 'success' ? 'bg-emerald-50/95 border-emerald-200 text-emerald-900' :
                t.type === 'error' ? 'bg-red-50/95 border-red-200 text-red-900' :
                t.type === 'warning' ? 'bg-amber-50/95 border-amber-200 text-amber-900' :
                'bg-blue-50/95 border-blue-200 text-blue-900'
              }`}>
                <i className={`ph-fill text-xl ${t.type === 'success' ? 'ph-check-circle' : t.type === 'error' ? 'ph-x-circle' : t.type === 'warning' ? 'ph-warning' : 'ph-info'}`}></i>
                <p className="text-sm font-medium leading-tight">{t.message}</p>
              </div>
            ))}
          </div>
        </ToastContext.Provider>
      );
    }
    const useToast = () => React.useContext(ToastContext);

    // ============================================================
    // REUSABLE COMPONENTS
    // ============================================================
    const SelectYesNo = ({ label, name, value, onChange, helperText }) => (
      <div className={`flex flex-col sm:flex-row sm:items-center justify-between p-3 bg-white border rounded-xl transition-all ${value === 'Ya' ? 'border-emerald-300 bg-emerald-50/30' : 'border-gray-200 hover:border-gray-300'}`}>
        <div className="mb-2 sm:mb-0 flex-1">
          <label className="block text-sm font-semibold text-gray-800">{label}</label>
          {helperText && <p className="text-xs text-gray-500 mt-0.5">{helperText}</p>}
        </div>
        <select name={name} value={value} onChange={onChange}
          className={`w-full sm:w-24 p-2 text-sm border rounded-lg focus:ring-2 focus:ring-emerald-400 outline-none font-semibold ${
            value === 'Ya' ? 'bg-emerald-100 border-emerald-300 text-emerald-800' : 'bg-gray-50 border-gray-200 text-gray-600'
          }`}>
          <option value="Ya">✓ Ya</option>
          <option value="Tidak">✗ Tidak</option>
        </select>
      </div>
    );

    const SelectCustom = ({ label, name, value, onChange, options, helperText }) => (
      <div className="flex flex-col sm:flex-row sm:items-center justify-between p-3 bg-white border border-gray-200 rounded-xl hover:border-gray-300 transition-all">
        <div className="mb-2 sm:mb-0 flex-1">
          <label className="block text-sm font-semibold text-gray-800">{label}</label>
          {helperText && <p className="text-xs text-gray-500 mt-0.5">{helperText}</p>}
        </div>
        <select name={name} value={value} onChange={onChange}
          className="w-full sm:w-56 p-2 text-sm border border-gray-200 rounded-lg focus:ring-2 focus:ring-emerald-400 outline-none bg-gray-50 font-medium">
          {options.map(opt => <option key={opt} value={opt}>{opt}</option>)}
        </select>
      </div>
    );

    const TextInput = ({ label, name, value, onChange, type = 'text', placeholder, required, helperText, suffix }) => (
      <div>
        <label className="block text-sm font-semibold text-gray-700 mb-1.5">
          {label} {required && <span className="text-red-500">*</span>}
        </label>
        <div className="relative">
          <input type={type} name={name} value={value} onChange={onChange} required={required} placeholder={placeholder}
            className="w-full p-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-emerald-400 focus:border-emerald-400 outline-none bg-white transition-all text-sm" />
          {suffix && <span className="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-gray-400 font-mono-data">{suffix}</span>}
        </div>
        {helperText && <p className="text-xs text-gray-500 mt-1">{helperText}</p>}
      </div>
    );

    const Textarea = ({ label, name, value, onChange, rows = 3, placeholder, helperText, maxLength }) => (
      <div>
        <div className="flex justify-between items-baseline mb-1.5">
          <label className="block text-sm font-semibold text-gray-700">{label}</label>
          {maxLength && <span className="text-xs text-gray-400 font-mono-data">{(value || '').length}/{maxLength}</span>}
        </div>
        <textarea name={name} value={value} onChange={onChange} rows={rows} placeholder={placeholder} maxLength={maxLength}
          className="w-full p-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-emerald-400 outline-none bg-white text-sm resize-none" />
        {helperText && <p className="text-xs text-gray-500 mt-1">{helperText}</p>}
      </div>
    );

    // ============================================================
    // SCORE CIRCLE
    // ============================================================
    const ScoreCircle = ({ score, size = 160 }) => {
      const radius = (size - 20) / 2;
      const circumference = 2 * Math.PI * radius;
      const offset = circumference - (score / 100) * circumference;
      const color = score >= 80 ? '#10b981' : score >= 60 ? '#f59e0b' : '#ef4444';
      return (
        <div className="relative inline-block">
          <svg width={size} height={size}>
            <circle cx={size/2} cy={size/2} r={radius} stroke="rgba(255,255,255,0.1)" strokeWidth="10" fill="none"/>
            <circle cx={size/2} cy={size/2} r={radius} stroke={color} strokeWidth="10" fill="none"
              strokeDasharray={circumference} strokeDashoffset={offset} strokeLinecap="round"
              className="score-ring" style={{ filter: `drop-shadow(0 0 6px ${color}80)` }}/>
          </svg>
          <div className="absolute inset-0 flex flex-col items-center justify-center">
            <span className="text-5xl font-black text-white font-display">{Math.round(score)}</span>
            <span className="text-xs text-gray-400 uppercase tracking-widest">/ 100</span>
          </div>
        </div>
      );
    };

    const PillarBar = ({ icon, label, value, max, color }) => {
      const pct = (value / max) * 100;

          </div>
          <div className="h-1.5 bg-gray-700 rounded-full overflow-hidden">
            <div className="h-full rounded-full transition-all duration-500" style={{ width: `${pct}%`, backgroundColor: color, boxShadow: `0 0 8px ${color}` }}/>
          </div>
        </div>
      );
    };

    // ============================================================
    // IMAGE UPLOADER COMPONENT
    // ============================================================
    const ImageUploader = ({ images, onAdd, onRemove, max = 4, label = "Foto Produk" }) => {
      const inputRef = useRef(null);
      const [uploading, setUploading] = useState(false);
      const toast = useToast();

      const handleFiles = async (files) => {
        if (!files || files.length === 0) return;
        if (images.length + files.length > max) {
          toast.show(`Maksimal ${max} foto`, 'warning');
          return;
        }
        setUploading(true);
        for (const file of files) {
          try {
            if (file.size > 10 * 1024 * 1024) {
              toast.show(`${file.name} > 10MB, dilewati`, 'warning');
              continue;
            }
            const compressed = await compressImage(file);
            onAdd(compressed);
            toast.show(`${file.name} dikompresi: ${compressed.originalSize}KB → ${compressed.compressedSize}KB`, 'success');
          } catch (err) {
            toast.show(`Gagal proses ${file.name}: ${err.message}`, 'error');
          }
        }
        setUploading(false);
      };

      return (
        <div>
          <label className="block text-sm font-semibold text-gray-700 mb-2">
            {label} <span className="text-xs text-gray-400 font-normal">({images.length}/{max})</span>
          </label>
          <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
            {images.map((img, idx) => (
              <div key={idx} className="image-tile group">
                <img src={img.data} alt={img.name} />
                <div className="overlay">
                  <button type="button" onClick={() => onRemove(idx)}
                    className="ml-auto bg-red-500 hover:bg-red-600 text-white p-1.5 rounded-full text-xs">
                    <i className="ph ph-trash"></i>
                  </button>
                </div>
                <div className="absolute bottom-0 left-0 right-0 bg-black/60 text-white text-[10px] px-2 py-1 font-mono-data">
                  {formatBytes(img.compressedSize)}
                </div>
              </div>
            ))}
            {images.length < max && (
              <button type="button" onClick={() => inputRef.current?.click()}
                className={`upload-zone aspect-square rounded-xl flex flex-col items-center justify-center gap-1 text-gray-500 hover:text-emerald-600 ${uploading ? 'opacity-50 pointer-events-none' : ''}`}>
                {uploading ? (
                  <i className="ph ph-spinner-gap animate-spin text-3xl"></i>
                ) : (
                  <>
                    <i className="ph ph-upload-simple text-3xl"></i>
                    <span className="text-xs font-medium">Upload</span>
                    <span className="text-[10px] text-gray-400">auto-compress</span>
                  </>
                )}
              </button>
            )}
          </div>
          <input ref={inputRef} type="file" accept="image/*" multiple className="hidden"
            onChange={(e) => { handleFiles(e.target.files); e.target.value = null; }} />
        </div>
      );
    };

    // ============================================================
    // SINGLE IMAGE UPLOADER (for producer photo, etc.)
    // ============================================================
    const SingleImageUploader = ({ image, onChange, label = "Foto" }) => {
      const inputRef = useRef(null);
      const [uploading, setUploading] = useState(false);
      const toast = useToast();

      const handleFile = async (file) => {
        if (!file) return;
        setUploading(true);
        try {
          const compressed = await compressImage(file, 800, 0.7);
          onChange(compressed);
          toast.show(`Foto: ${compressed.originalSize}KB → ${compressed.compressedSize}KB`, 'success');
        } catch (err) {
          toast.show('Gagal upload', 'error');
        }
        setUploading(false);
      };

      return (
        <div>
          <label className="block text-sm font-semibold text-gray-700 mb-2">{label}</label>
          {image ? (
            <div className="relative inline-block">
              <img src={image.data} alt="" className="w-32 h-32 rounded-xl object-cover border-2 border-emerald-300" />
              <button type="button" onClick={() => onChange(null)}
                className="absolute -top-2 -right-2 bg-red-500 text-white rounded-full p-1.5 text-xs hover:bg-red-600">
                <i className="ph ph-x"></i>
              </button>
            </div>
          ) : (
            <button type="button" onClick={() => inputRef.current?.click()}
              className="upload-zone w-32 h-32 rounded-xl flex flex-col items-center justify-center gap-1 text-gray-500 hover:text-emerald-600">
              {uploading ? <i className="ph ph-spinner-gap animate-spin text-2xl"></i> : (
                <>
                  <i className="ph ph-user-circle text-3xl"></i>
                  <span className="text-xs">Upload</span>
                </>
              )}
            </button>
          )}
          <input ref={inputRef} type="file" accept="image/*" className="hidden"
            onChange={(e) => { handleFile(e.target.files[0]); e.target.value = null; }} />
        </div>
      );
    };

    // ============================================================
    // ACCORDION SECTION
    // ============================================================
    const Section = ({ title, icon, color, score, max, children, open = false }) => (
      <details open={open} className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden pillar-card">
        <summary className={`px-5 py-4 bg-gradient-to-r from-${color}-50 to-white border-b border-gray-100 flex items-center justify-between`}>
          <h3 className={`font-bold font-display text-${color}-800 flex items-center gap-2`}>
            <i className={`ph-fill ${icon} text-${color}-600`}></i>{title}
          </h3>
          <div className="flex items-center gap-3">
            {score !== undefined && (
              <span className={`text-xs font-mono-data bg-${color}-100 text-${color}-700 px-2 py-0.5 rounded`}>
                {score}/{max}
              </span>
            )}
            <i className={`ph ph-caret-down accordion-icon text-${color}-600`}></i>
          </div>
        </summary>
        <div className="p-5">{children}</div>
      </details>
    );

    // ============================================================
    // MAIN APP
    // ============================================================
    function AppInner() {
      const toast = useToast();
      const [activeTab, setActiveTab] = useState('dashboard');
      const [products, setProducts] = useState(initialData);
      const [isSyncing, setIsSyncing] = useState(null);
      const [showSettings, setShowSettings] = useState(false);
      const [showSaveModal, setShowSaveModal] = useState(false);
      const [showcaseProduct, setShowcaseProduct] = useState(null);
      const fileInputRef = useRef(null);

      const [settings, setSettings] = useState({ gasUrl: '', autoSync: false, autoSaveDraft: true });
      const [gasStatus, setGasStatus] = useState({ status: 'unchecked', message: 'Belum diuji', lastCheck: null });

      const initialForm = {
        // Identitas
        name: '', sku: '', producer: '', designation: 'Geopark', origin: '',
        productType: 'Pertanian / Pangan', priceLocal: '', priceExport: '',
        currency: 'IDR', targetMarket: '',
        // Geo
        latitude: '', longitude: '', altitude: '',
        // Narrative
        traditionalName: '', philosophy: '', story: '',
        taglineId: '', taglineEn: '',
        // Terroir Pertanian
        phTanah: '', soilType: 'Belum diketahui', climate: 'Belum diketahui',
        rainfall: '', avgTemp: '', humidity: '', shadeTree: 'Tidak',
        processingMethod: 'Tradisional', sensoryNotes: '',
        // Terroir Kriya/Hasil Hutan
        rawMaterial: '', rawMaterialLatin: '', partUsed: '',
        harvestMethod: 'Belum diketahui', rotationPeriod: '',
        naturalDyes: '', traditionalTechnique: '', timeToMake: '',
        // Biodiversity
        iucnStatus: 'NE - Not Evaluated', endemicSpecies: '', bioregion: '',
        // Producer profile
        producerCount: '', womenPercent: '', indigenousGroup: '', producerStory: '',
        // Pillar 1: Legal
        hasNIB: 'Tidak', hasNPWP: 'Tidak', hasSertifikatUsaha: 'Tidak', hasIzinEkspor: 'Tidak',
        hasHalal: 'Tidak', hasBPOM: 'Tidak', hasOrganicCert: 'Tidak', hasFSC: 'Tidak', hasEcoLabel: 'Tidak',
        sopCompleteness: 'Tidak',
        // Pillar 2: Sustainability
        sumberBahan: 'Legal Harvesting', isSumberLegal: 'Ya', pohonDitebang: 0, isReplanting: 'Tidak',
        hasCarbonManagement: 'Tidak', pengolahanLimbah: 'Buruk',
        // Pillar 3: Social
        isFairTrade: 'Tidak', hasGenderInclusion: 'Tidak', hasIndigenousInvolvement: 'Tidak',
        // Pillar 4: Authenticity
        isIGProtected: 'Tidak', hasTraditionalKnowledge: 'Tidak', hasUNESCOBranding: 'Tidak',
        hasCulturalIntegrity: 'Tidak', hasRegenerativePractice: 'Tidak',
        // Pillar 6: Storytelling
        hasProductStory: 'Tidak', hasInfografis: 'Tidak', kemasanRamah: 'Tidak',
        // Pillar 7: Digital
        hasQRCode: 'Tidak', hasProducerIdentity: 'Tidak', hasSupplyChain: 'Tidak',
        // Pillar 8: Climate
        totalEmissionKg: 0, outputTon: 0, estimatedAnnualOutputTon: 0,
        pohonDiselamatkan: 0, carbonSinkTon: 0, carbonAuditStatus: 'Tidak ada data',
        // Images
        images: [], producerPhoto: null
      };
      const [formData, setFormData] = useState(initialForm);
      const [scoreAnimKey, setScoreAnimKey] = useState(0);

      // ============================================================
      // LOAD ON MOUNT & FETCH FROM GAS
      // ============================================================
      useEffect(() => {
        const initializeData = async () => {
          try {
            // 1. Load Settings & Draft 
            const savedSettings = localStorage.getItem(SETTINGS_KEY);
            let currentSettings = { gasUrl: '', autoSync: false, autoSaveDraft: true };
            if (savedSettings) {
              currentSettings = JSON.parse(savedSettings);
              setSettings(currentSettings);
            }
            
            const draft = localStorage.getItem(DRAFT_KEY);
            if (draft) {
              const parsedDraft = JSON.parse(draft);
              if (parsedDraft.name || parsedDraft.producer) {
                setFormData({ ...initialForm, ...parsedDraft });
                toast.show('Draft sebelumnya dimuat', 'info');
              }
            }

            // 2. Load Local Data (Data yang belum tersinkron)
            let localData = [];
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
              const parsed = JSON.parse(saved);
              if (Array.isArray(parsed)) {
                // Pastikan hanya mengambil yang statusnya local
                localData = parsed.filter(p => p.syncStatus === 'local'); 
              }
            }

            // 3. Tarik data dari GAS (Jika URL sudah diisi)
            let gasData = [];
            if (currentSettings.gasUrl) {
              setGasStatus({ status: 'checking', message: 'Menarik data...', lastCheck: null });
              try {
                // Kita tambahkan parameter ?action=getData
                const res = await fetch(currentSettings.gasUrl + '?action=getData', { method: 'GET' });
                if (res.ok) {
                  const responseData = await res.json();
                  // Paksa semua data dari GAS memiliki status 'synced'
                  gasData = responseData.map(item => ({ ...item, syncStatus: 'synced' }));
                  setGasStatus({ status: 'connected', message: 'Data GAS terhubung', lastCheck: new Date().toISOString() });
                } else {
                  throw new Error('Response not ok');
                }
              } catch (err) {
                console.warn('GAS Fetch Error:', err);
                setGasStatus({ status: 'error', message: 'Gagal tarik data', lastCheck: new Date().toISOString() });
                toast.show('Gagal menarik data dari GAS, menggunakan data lokal.', 'warning');
              }
            }

            // 4. Gabungkan Data (GAS + Lokal)
            const combinedData = [...gasData, ...localData];
            
            // Jika kosong semua, gunakan initialData dummy
            if (combinedData.length === 0) {
              setProducts(initialData);
            } else {
              setProducts(combinedData);
            }

          } catch (e) { 
            console.warn('Initialization failed', e); 
          }
        };

        initializeData();
      }, []); // eslint-disable-next-line react-hooks/exhaustive-deps

            useEffect(() => {
              if (settings.autoSaveDraft && (formData.name || formData.producer)) {
                const timer = setTimeout(() => {
                  try {
                    localStorage.setItem(DRAFT_KEY, JSON.stringify(formData));
                  } catch (e) {
                    if (e.name === 'QuotaExceededError') {
                      toast.show('Local storage penuh — kurangi gambar', 'warning');
                    }
                  }
                }, 1000);
                return () => clearTimeout(timer);
              }
            }, [formData, settings.autoSaveDraft]);

            useEffect(() => {
              try {
                // Optimasi: HANYA simpan data yang belum sinkron ke Local Storage
                const localOnly = products.filter(p => p.syncStatus === 'local');
                localStorage.setItem(STORAGE_KEY, JSON.stringify(localOnly));
              } catch (e) {
                if (e.name === 'QuotaExceededError') toast.show('Storage penuh!', 'error');
              }
            }, [products]);

            useEffect(() => { localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); }, [settings]);

      // ============================================================
      // GAS CONNECTION
      // ============================================================
      const testGasConnection = async () => {
        if (!settings.gasUrl) {
          setGasStatus({ status: 'error', message: 'URL GAS belum diisi', lastCheck: new Date().toISOString() });
          toast.show('Isi URL GAS di Settings', 'warning');
          return false;
        }
        setGasStatus({ status: 'checking', message: 'Menguji koneksi...', lastCheck: null });
        try {
          const res = await fetch(settings.gasUrl + '?action=ping', { method: 'GET', mode: 'cors' });
          if (res.ok) {
            setGasStatus({ status: 'connected', message: 'Database GAS terhubung', lastCheck: new Date().toISOString() });
            toast.show('Database GAS terhubung ✓', 'success');
            return true;
          }
          throw new Error('Response not ok');
        } catch (err) {
          setGasStatus({ status: 'error', message: 'Gagal koneksi - mode fallback', lastCheck: new Date().toISOString() });
          toast.show('Database tidak terbaca. Mode fallback aktif', 'warning', 5000);
          return false;
        }
      };

      const sendToGAS = async (product) => {
        if (!settings.gasUrl) throw new Error('GAS URL tidak diatur');
        await fetch(settings.gasUrl, {
          method: 'POST', mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: 'save', payload: product })
        });
        return true;
      };

      const handleSync = async (product) => {
        setIsSyncing(product.id);
        try {
          if (gasStatus.status !== 'connected') {
            const ok = await testGasConnection();
            if (!ok) throw new Error('Database tidak terhubung');
          }
          await sendToGAS(product);
          setProducts(prev => prev.map(p => p.id === product.id ? { ...p, syncStatus: 'synced' } : p));
          toast.show(`"${product.name}" tersinkron ke GAS`, 'success');
        } catch (err) {
          toast.show(`Sync gagal: ${err.message}. Data aman di local.`, 'error', 5000);
        } finally {
          setIsSyncing(null);
        }
      };

      // ============================================================
      // SCORING (8 PILLARS = 100 points)
      // ============================================================
      const calculateScores = (data) => {
        // 1. Legal & Compliance (12)
        let legal = 0;
        ['hasNIB','hasNPWP','hasSertifikatUsaha','hasIzinEkspor','hasHalal','hasBPOM','hasOrganicCert','hasFSC','hasEcoLabel'].forEach(k => { if (data[k] === 'Ya') legal += 1; });
        if (data.sopCompleteness === 'Lengkap') legal += 3;
        else if (data.sopCompleteness === 'Sebagian') legal += 1;
        legal = Math.min(legal, 12);

        // 2. Sustainability (12)
        let sustain = 0;
        if (data.isSumberLegal === 'Ya') sustain += 4;
        const pohon = parseInt(data.pohonDitebang) || 0;
        if (pohon === 0) sustain += 3;
        else if (pohon <= 5) sustain += 1;
        if (data.isReplanting === 'Ya') sustain += 2;
        if (data.hasCarbonManagement === 'Ya') sustain += 2;
        if (data.pengolahanLimbah === 'Baik') sustain += 1;

        // 3. Social Justice (10)
        let social = 0;
        if (data.isFairTrade === 'Ya') social += 4;
        if (data.hasGenderInclusion === 'Ya') social += 3;
        if (data.hasIndigenousInvolvement === 'Ya') social += 3;

        // 4. Authenticity & IP (15)
        let auth = 0;
        if (data.isIGProtected === 'Ya') auth += 4;
        if (data.hasTraditionalKnowledge === 'Ya') auth += 3;
        if (data.hasUNESCOBranding === 'Ya') auth += 3;
        if (data.hasCulturalIntegrity === 'Ya') auth += 2;
        if (data.hasRegenerativePractice === 'Ya') auth += 3;

        // 5. Terroir & Bioregion (15) — ADAPTIVE
        let terroir = 0;
        if (data.latitude && data.longitude) terroir += 2;
        if (data.altitude) terroir += 1;
        if (data.bioregion) terroir += 2;
        if (data.endemicSpecies) terroir += 1;
        if (data.iucnStatus && !data.iucnStatus.startsWith('NE')) terroir += 2;
        if (data.productType === 'Pertanian / Pangan' || data.productType === 'Hasil Hutan') {
          if (data.phTanah) terroir += 1;
          if (data.soilType && data.soilType !== 'Belum diketahui') terroir += 2;
          if (data.climate && data.climate !== 'Belum diketahui') terroir += 1;
          if (data.rainfall) terroir += 1;
          if (data.processingMethod && data.processingMethod !== 'Lainnya') terroir += 2;
        } else if (data.productType === 'Kriya / Kerajinan') {
          if (data.rawMaterial) terroir += 1;
          if (data.rawMaterialLatin) terroir += 2;
          if (data.harvestMethod === 'Regeneratif (lestari)') terroir += 3;
          else if (data.harvestMethod !== 'Belum diketahui') terroir += 1;
          if (data.naturalDyes) terroir += 1;
          if (data.traditionalTechnique) terroir += 1;
        } else {
          terroir += 5; // base for other types
        }
        terroir = Math.min(terroir, 15);

        // 6. Storytelling & Narrative (12)
        let story = 0;
        if (data.hasProductStory === 'Ya') story += 2;
        if (data.hasInfografis === 'Ya') story += 2;
        if (data.kemasanRamah === 'Ya') story += 2;
        if (data.story && data.story.length > 100) story += 2;
        if (data.philosophy) story += 1;
        if (data.taglineEn) story += 1;
        if (data.traditionalName) story += 1;
        if (data.producerStory) story += 1;
        story = Math.min(story, 12);

        // 7. Digital Traceability (12)
        let digital = 0;
        if (data.hasQRCode === 'Ya') digital += 4;
        if (data.hasProducerIdentity === 'Ya') digital += 4;
        if (data.hasSupplyChain === 'Ya') digital += 4;

        // 8. Climate Impact (12)
        const auditMap = {
          "Tidak ada data": 0, "Klaim tanpa bukti": 1, "Estimasi kasar": 3,
          "Baseline audit tersedia": 6, "Verified carbon accounting": 9, "Siap carbon financing": 12
        };
        const climate = auditMap[data.carbonAuditStatus] || 0;

        const total = legal + sustain + social + auth + terroir + story + digital + climate;
        return { legal, sustain, social, auth, terroir, story, digital, climate, total };
      };

      const getStatus = (s) => s >= 80 ? "Lolos Premium" : s >= 60 ? "Inkubasi" : "Ditolak";

      const computeCarbonMetrics = () => {
        const emission = parseFloat(formData.totalEmissionKg) || 0;
        const output = parseFloat(formData.outputTon) || 0;
        const annualOutput = parseFloat(formData.estimatedAnnualOutputTon) || 0;
        const pohon = parseInt(formData.pohonDiselamatkan) || 0;
        const directSink = parseFloat(formData.carbonSinkTon) || 0;
        const footprintPerTon = output > 0 ? (emission / 1000) / output : 0;
        const sinkFromPohon = pohon * 22 / 1000;
        const annualSink = directSink > 0 ? directSink : sinkFromPohon;
        const netClimate = annualSink - (footprintPerTon * (annualOutput > 0 ? annualOutput : 1));
        return { footprintPerTon, annualSink, netClimate, isPositive: netClimate > 0 };
      };

      const scores = useMemo(() => calculateScores(formData), [formData]);
      const carbon = useMemo(() => computeCarbonMetrics(), [formData]);

      const prevTotalRef = useRef(scores.total);
      useEffect(() => {
        if (prevTotalRef.current !== scores.total) {
          setScoreAnimKey(k => k + 1);
          prevTotalRef.current = scores.total;
        }
      }, [scores.total]);

      const handleInputChange = (e) => {
        const { name, value } = e.target;
        setFormData(prev => ({ ...prev, [name]: value }));
      };

      // Image handlers
      const addImage = (img) => setFormData(prev => ({ ...prev, images: [...prev.images, img] }));
      const removeImage = (idx) => setFormData(prev => ({ ...prev, images: prev.images.filter((_, i) => i !== idx) }));
      const setProducerPhoto = (img) => setFormData(prev => ({ ...prev, producerPhoto: img }));

      // Calculate payload size
      const payloadSize = useMemo(() => {
        try {
          return JSON.stringify(formData).length / 1024;
        } catch { return 0; }
      }, [formData]);

      // ============================================================
      // SAVE METHODS
      // ============================================================
      const performSave = async (method) => {
        if (!formData.name || !formData.producer) {
          toast.show('Nama Produk & Produsen wajib diisi', 'error');
          return;
        }
        const newProduct = {
          id: products.length > 0 ? Math.max(...products.map(p => p.id)) + 1 : 1,
          ...formData,
          totalScore: scores.total,
          status: getStatus(scores.total),
          date: new Date().toISOString().split('T')[0],
          syncStatus: 'local'
        };

        if (method === 'gas') {
          try {
            if (gasStatus.status !== 'connected') {
              const ok = await testGasConnection();
              if (!ok) {
                setProducts([newProduct, ...products]);
                toast.show('GAS gagal. Tersimpan local sebagai fallback.', 'warning');
                resetAndExit();
                return;
              }
            }
            await sendToGAS(newProduct);
            newProduct.syncStatus = 'synced';
            setProducts([newProduct, ...products]);
            toast.show('Tersimpan ke Database GAS ✓', 'success');
            resetAndExit();
          } catch (err) {
            setProducts([newProduct, ...products]);
            toast.show('GAS error. Disimpan ke Local sebagai fallback', 'warning');
            resetAndExit();
          }
        } else if (method === 'local') {
          setProducts([newProduct, ...products]);
          toast.show('Tersimpan ke Local Storage ✓', 'success');
          resetAndExit();
        } else if (method === 'json') {
          setProducts([newProduct, ...products]);
          const blob = new Blob([JSON.stringify([newProduct], null, 2)], { type: "application/json" });
          const a = document.createElement("a");
          a.href = URL.createObjectURL(blob);
          a.download = `igpos_${newProduct.name.replace(/\s+/g,'_')}_${Date.now()}.json`;
          a.click();
          toast.show('Diunduh sebagai JSON ✓', 'success');
          resetAndExit();
        }
      };

      const resetAndExit = () => {
        setFormData(initialForm);
        localStorage.removeItem(DRAFT_KEY);
        setShowSaveModal(false);
        setActiveTab('dashboard');
      };

      const handleExportAll = () => {
        const blob = new Blob([JSON.stringify(products, null, 2)], { type: "application/json" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `igpos_database_${new Date().toISOString().split('T')[0]}.json`;
        a.click();
        toast.show(`${products.length} produk diekspor (${formatBytes(blob.size/1024)})`, 'success');
      };

      const handleImport = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const data = JSON.parse(ev.target.result);
            if (Array.isArray(data)) {
              setProducts(data);
              toast.show(`${data.length} produk diimpor`, 'success');
            } else throw new Error('Bukan array');
          } catch (err) { toast.show('JSON tidak valid', 'error'); }
        };
        reader.readAsText(file);
        e.target.value = null;
      };

      // ============================================================
      // RENDER DASHBOARD
      // ============================================================
      const renderDashboard = () => {
        const total = products.length;
        const lolos = products.filter(p => p.status === "Lolos Premium").length;
        const inkubasi = products.filter(p => p.status === "Inkubasi").length;
        const synced = products.filter(p => p.syncStatus === "synced").length;
        const totalCarbonSink = products.reduce((acc, p) => acc + (parseFloat(p.carbonSinkTon) || 0), 0);

        return (
          <div className="space-y-6 animate-fadeInUp">
            <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
              {[
                { icon: 'ph-database', label: 'Total Dikurasi', value: total, color: 'blue', suffix: 'Produk' },
                { icon: 'ph-medal-fill', label: 'Lolos Premium', value: lolos, color: 'emerald', suffix: '★' },
                { icon: 'ph-seedling', label: 'Inkubasi', value: inkubasi, color: 'amber', suffix: '' },
                { icon: 'ph-tree', label: 'Carbon Sink', value: totalCarbonSink.toFixed(1), color: 'green', suffix: 'tCO₂e' }
              ].map((s, i) => (
                <div key={i} className="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm hover:shadow-md transition-all">
                  <div className={`p-2.5 inline-flex bg-${s.color}-100 text-${s.color}-600 rounded-xl mb-3`}>
                    <i className={`ph ${s.icon} text-2xl`}></i>
                  </div>
                  <p className="text-xs text-gray-500 uppercase tracking-wider font-semibold">{s.label}</p>
                  <h3 className="text-3xl font-black font-display text-gray-900 mt-1 font-mono-data">{s.value}</h3>
                  {s.suffix && <p className="text-xs text-gray-400 mt-0.5">{s.suffix}</p>}
                </div>
              ))}
            </div>

            <div className="header-batik rounded-2xl p-6 lg:p-8 text-white relative overflow-hidden">
              <div className="relative z-10 flex flex-col lg:flex-row items-start lg:items-center justify-between gap-4">
                <div className="max-w-2xl">
                  <p className="text-amber-300 font-semibold tracking-wider text-xs uppercase mb-2">
                    <i className="ph-fill ph-flag mr-1"></i> IGPOS · Indonesia Geoproduct Online System
                  </p>
                  <h2 className="text-2xl lg:text-3xl font-black font-display mb-2">
                    Dari Warisan Lokal ke <span className="text-amber-300">Pasar Global Premium</span>
                  </h2>
                  <p className="text-emerald-100 text-sm">
                    Sistem 8-pilar mengubah produk PLUT menjadi Geoproduct premium dengan jaminan terroir, biodiversitas, dan mitigasi iklim.
                  </p>
                </div>
                <button onClick={() => setActiveTab('curation')} className="btn-gold text-white font-bold px-6 py-3 rounded-xl flex items-center gap-2 hover:scale-105 transition-transform">
                  <i className="ph-fill ph-plus-circle text-xl"></i> Kurasi Produk Baru
                </button>
              </div>
            </div>

            {/* Premium Showcase Cards Grid */}
            {lolos > 0 && (
              <div>
                <div className="flex items-center gap-2 mb-4">
                  <i className="ph-fill ph-crown-simple text-amber-500 text-2xl"></i>
                  <h2 className="text-xl font-black font-display">Premium Geoproduct Showcase</h2>
                  <span className="text-xs bg-amber-100 text-amber-800 px-2 py-1 rounded-full font-bold">{lolos} produk</span>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                  {products.filter(p => p.status === 'Lolos Premium').map(p => (
                    <div key={p.id} onClick={() => setShowcaseProduct(p)} className="luxe-border cursor-pointer hover:scale-[1.02] transition-transform">

            <div className="text-xs text-gray-500 mb-5 flex items-center gap-1">
              <i className="ph ph-house"></i><span>IGPOS</span><i className="ph ph-caret-right text-[8px]"></i>
              <span className="font-bold text-gray-700">{activeTab==='dashboard' ? 'Dashboard' : 'Form Kurasi 8 Pilar'}</span>
              {gasStatus.status === 'error' && (
                <span className="ml-auto bg-amber-100 text-amber-800 px-2 py-1 rounded-md text-[10px] font-bold">
                  <i className="ph-fill ph-warning mr-1"></i>Mode Fallback (Local/JSON)
                </span>
              )}
            </div>
            {activeTab === 'dashboard' ? renderDashboard() : renderCuration()}
          </main>

          {/* SHOWCASE MODAL */}
          {renderShowcaseModal()}

          {/* SETTINGS MODAL */}
          {showSettings && (
            <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-40 flex items-center justify-center p-4 animate-fadeInUp" onClick={() => setShowSettings(false)}>
              <div className="bg-white rounded-2xl shadow-2xl max-w-md w-full overflow-hidden" onClick={e => e.stopPropagation()}>
                <div className="header-batik p-5 text-white relative">
                  <h3 className="font-bold font-display text-lg flex items-center gap-2 relative z-10"><i className="ph-fill ph-gear-six"></i>Pengaturan Database</h3>
                </div>
                <div className="p-5 space-y-4">
                  <div>
                    <label className="block text-sm font-semibold text-gray-800 mb-1.5">URL Google Apps Script</label>
                    <input type="url" value={settings.gasUrl} onChange={e => setSettings(s => ({ ...s, gasUrl: e.target.value }))}
                      placeholder="https://script.google.com/macros/s/AKfycbx.../exec"
                      className="w-full p-2.5 border border-gray-200 rounded-lg text-sm bg-gray-50" />
                  </div>
                  <div className={`p-3 rounded-xl border ${gasStatus.status === 'connected' ? 'bg-emerald-50 border-emerald-200' : gasStatus.status === 'error' ? 'bg-red-50 border-red-200' : 'bg-gray-50 border-gray-200'}`}>
                    <div className="flex items-center gap-2 mb-1">
                      <span className={`w-2 h-2 rounded-full ${gasStatus.status === 'connected' ? 'bg-emerald-500' : gasStatus.status === 'error' ? 'bg-red-500' : 'bg-gray-400'}`}></span>
                      <span className="text-xs font-bold uppercase">{gasStatus.status}</span>
                    </div>
                    <p className="text-sm">{gasStatus.message}</p>
                  </div>
                  <button onClick={testGasConnection} className="w-full btn-emerald text-white font-bold py-2.5 rounded-xl"><i className="ph-fill ph-plugs-connected mr-1"></i>Test Koneksi</button>
                  <div className="border-t pt-3 space-y-2">
                    <label className="flex items-center gap-3 cursor-pointer">
                      <input type="checkbox" checked={settings.autoSync} onChange={e => setSettings(s => ({ ...s, autoSync: e.target.checked }))} className="w-4 h-4 accent-emerald-600" />
                      <span className="text-sm">Auto-sync ke GAS saat simpan</span>
                    </label>
                    <label className="flex items-center gap-3 cursor-pointer">
                      <input type="checkbox" checked={settings.autoSaveDraft} onChange={e => setSettings(s => ({ ...s, autoSaveDraft: e.target.checked }))} className="w-4 h-4 accent-emerald-600" />
                      <span className="text-sm">Auto-save draft form</span>
                    </label>
                  </div>
                  <button onClick={() => setShowSettings(false)} className="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-2 rounded-xl">Tutup</button>
                </div>
              </div>
            </div>
          )}

          {/* SAVE MODAL */}
          {showSaveModal && (
            <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-40 flex items-center justify-center p-4 animate-fadeInUp" onClick={() => setShowSaveModal(false)}>
              <div className="bg-white rounded-2xl shadow-2xl max-w-lg w-full overflow-hidden" onClick={e => e.stopPropagation()}>
                <div className="header-batik p-5 text-white relative">
                  <h3 className="font-bold font-display text-lg flex items-center gap-2 relative z-10"><i className="ph-fill ph-floppy-disk"></i>Pilih Metode Simpan</h3>
                  <p className="text-xs text-emerald-200 relative z-10 mt-1">Skor: {scores.total}/100 · {getStatus(scores.total)} · {formatBytes(payloadSize)}</p>
                </div>
                <div className="p-5 space-y-3">
                  <button onClick={() => performSave('gas')} disabled={gasStatus.status !== 'connected'} className="w-full p-4 border-2 border-emerald-200 hover:border-emerald-500 hover:bg-emerald-50 rounded-xl flex items-start gap-3 text-left transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                    <div className="bg-emerald-100 p-2 rounded-lg"><i className="ph-fill ph-cloud-arrow-up text-emerald-700 text-xl"></i></div>
                    <div className="flex-1">
                      <p className="font-bold text-gray-900">Simpan ke Google Apps Script</p>
                      <p className="text-xs text-gray-500">{gasStatus.status === 'connected' ? 'Database online — siap menerima' : 'Database offline — gunakan mode lain'}</p>
                    </div>
                    <span className={`text-[10px] px-2 py-1 rounded-full font-bold ${gasStatus.status === 'connected' ? 'bg-emerald-100 text-emerald-700' : 'bg-red-100 text-red-700'}`}>{gasStatus.status === 'connected' ? 'ONLINE' : 'OFFLINE'}</span>
                  </button>
                  <button onClick={() => performSave('local')} className="w-full p-4 border-2 border-blue-200 hover:border-blue-500 hover:bg-blue-50 rounded-xl flex items-start gap-3 text-left">
                    <div className="bg-blue-100 p-2 rounded-lg"><i className="ph-fill ph-hard-drives text-blue-700 text-xl"></i></div>
                    <div className="flex-1">
                      <p className="font-bold text-gray-900">Simpan ke Local Storage</p>
                      <p className="text-xs text-gray-500">Tersimpan di browser, sinkron nanti</p>
                    </div>
                    <span className="text-[10px] bg-blue-100 text-blue-700 px-2 py-1 rounded-full font-bold">AKTIF</span>
                  </button>
                  <button onClick={() => performSave('json')} className="w-full p-4 border-2 border-amber-200 hover:border-amber-500 hover:bg-amber-50 rounded-xl flex items-start gap-3 text-left">
                    <div className="bg-amber-100 p-2 rounded-lg"><i className="ph-fill ph-file-arrow-down text-amber-700 text-xl"></i></div>
                    <div className="flex-1">
                      <p className="font-bold text-gray-900">Download sebagai JSON</p>
                      <p className="text-xs text-gray-500">Backup lengkap (termasuk gambar base64)</p>
                    </div>
                    <span className="text-[10px] bg-amber-100 text-amber-700 px-2 py-1 rounded-full font-bold">BACKUP</span>
                  </button>
                  <button onClick={() => setShowSaveModal(false)} className="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-2.5 rounded-xl">Batal</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function App() { return <ToastProvider><AppInner /></ToastProvider>; }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
